<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>运动 Challenge — Move together, stay accountable</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1320; --bg2:#161b2e; --card:#1c2238; --card2:#232a45;
    --line:#2c3454; --text:#f4f6ff; --muted:#9aa6c7;
    --orange:#ff6b35; --coral:#ff4d6d; --amber:#ffb02e;
    --teal:#1fd4b4; --green:#34d399; --blue:#4d7cff; --purple:#9b6bff;
    --grad:linear-gradient(135deg,#ff6b35,#ff4d6d);
    --grad2:linear-gradient(135deg,#1fd4b4,#4d7cff);
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#23305a 0%,var(--bg) 55%) fixed;
    color:var(--text); min-height:100vh; padding-bottom:84px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .btn{background:var(--grad);color:#fff;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:700;width:100%;box-shadow:0 6px 18px rgba(255,77,109,.35);transition:transform .08s}
  .btn:active{transform:scale(.97)}
  .btn.alt{background:var(--card2);box-shadow:none;border:1px solid var(--line)}
  .btn.teal{background:var(--grad2);box-shadow:0 6px 18px rgba(31,212,180,.3)}
  .btn.sm{padding:9px 14px;font-size:14px;width:auto;border-radius:11px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .muted{color:var(--muted)}
  .row{display:flex;align-items:center;gap:12px}
  .between{justify-content:space-between}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);padding:6px 11px;border-radius:999px;font-size:13px;font-weight:600}
  .grid{display:grid;gap:12px}
  .hidden{display:none!important}
  .center{text-align:center}
  input,select{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:13px;font-size:16px;outline:none}
  input:focus,select:focus{border-color:var(--orange)}
  label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin:0 0 6px 2px}
  .field{margin-bottom:14px}
  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .logo{font-weight:900;font-size:22px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
  .logo .dot{width:14px;height:14px;border-radius:50%;background:var(--grad)}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--line)}
  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(16,19,32,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px 14px;z-index:50}
  .nav button{background:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;flex:1;padding:4px}
  .nav button .ic{font-size:21px}
  .nav button.active{color:var(--orange)}
  /* hero stat */
  .hero{background:var(--grad);border-radius:22px;padding:20px;color:#fff;box-shadow:0 12px 30px rgba(255,77,109,.35);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:rgba(255,255,255,.12);border-radius:50%}
  .stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}
  .stat3 .v{font-size:24px;font-weight:900}
  .stat3 .l{font-size:11px;opacity:.9;text-transform:uppercase;letter-spacing:.5px}
  .chip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;background:var(--card2);border:1px solid var(--line)}
  .wtile{display:flex;align-items:center;gap:14px;padding:14px;border-radius:16px;background:var(--card);border:1px solid var(--line);text-align:left;width:100%}
  .wtile:active{transform:scale(.99)}
  .wico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .bar{height:9px;background:var(--bg2);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--grad2);border-radius:99px;transition:width .4s}
  /* exercise runner */
  .exhead{font-size:13px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.6px}
  .setrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:13px;background:var(--bg2);border:1px solid var(--line);margin-bottom:8px}
  .setrow.done{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.5)}
  .check{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--card)}
  .setrow.done .check{background:var(--green);border-color:var(--green);color:#06281c}
  .repedit{width:54px;text-align:center;padding:8px;font-weight:800;font-size:16px}
  /* rest overlay */
  .rest{position:fixed;inset:0;background:rgba(8,10,20,.96);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .ring{font-size:72px;font-weight:900;font-variant-numeric:tabular-nums}
  .badge{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px;border-radius:16px;background:var(--card);border:1px solid var(--line);text-align:center}
  .badge.locked{opacity:.38;filter:grayscale(.6)}
  .badge .e{font-size:34px}
  .badge .n{font-size:12px;font-weight:700}
  .lb-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--line);margin-bottom:8px}
  .rank{width:30px;font-weight:900;font-size:17px;text-align:center}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);padding:12px 18px;border-radius:14px;font-weight:700;box-shadow:var(--shadow);z-index:200;opacity:0;transition:opacity .3s,bottom .3s}
  .toast.show{opacity:1;bottom:108px}
  .seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px}
  .seg button{flex:1;padding:9px;border-radius:10px;font-weight:700;font-size:13px;background:none;color:var(--muted)}
  .seg button.on{background:var(--grad);color:#fff}
  .agechip{padding:12px 8px;border-radius:13px;border:1px solid var(--line);background:var(--card);text-align:center;font-weight:700;font-size:13px}
  .agechip.on{border-color:var(--orange);background:rgba(255,107,53,.15)}
  .agechip .e{font-size:22px;display:block;margin-bottom:3px}
  .ex-pick{display:flex;align-items:center;gap:10px;padding:11px;border-radius:12px;background:var(--bg2);border:1px solid var(--line);margin-bottom:7px}
  .ex-pick.on{border-color:var(--teal);background:rgba(31,212,180,.12)}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--card2);color:var(--muted)}
  a.link{color:var(--teal);font-weight:700;text-decoration:none}
  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<nav class="nav hidden" id="nav">
  <button data-tab="home"><span class="ic">🏠</span>Home</button>
  <button data-tab="leaderboard"><span class="ic">🏆</span>Squad</button>
  <button data-tab="badges"><span class="ic">🎖️</span>Badges</button>

</nav>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   运动 Challenge  —  data, content & logic
   ============================================================ */

/* ---------- AGE GROUPS ---------- */
const AGE_GROUPS = {
  youth:       {label:"Youth",       sub:"Ages 6–12",  emoji:"🧒", sets:2, repMul:0.8, restSet:30, restEx:45, impact:1, note:"Fun & form-first"},
  teenager:    {label:"Teenager",    sub:"Ages 13–17", emoji:"🧑", sets:3, repMul:1.0, restSet:45, restEx:60, impact:3, note:"Build strength"},
  young_adult: {label:"Young Adult", sub:"Ages 18–29", emoji:"🧑‍🦱", sets:4, repMul:1.15,restSet:50, restEx:60, impact:3, note:"High intensity"},
  adult:       {label:"Adult",       sub:"Ages 30–45", emoji:"🧔", sets:3, repMul:1.0, restSet:60, restEx:75, impact:2, note:"Balanced & steady"},

  grandparent: {label:"Grandparent", sub:"Ages 60+",   emoji:"🧓", sets:2, repMul:0.7, restSet:75, restEx:90, impact:1, note:"Gentle & mobile"},

/* ---------- EXERCISE LIBRARY (bodyweight + minimal gear) ----------
   impact: 1 low / 2 medium / 3 high   |   unit: reps | sec (per side handled in name) */
const EXERCISES = [
  // PUSH
  {id:"pushup",   name:"Push-ups",          part:"Push", emoji:"🙇", base:10, unit:"reps", impact:2, tip:"Hands under your shoulders. Lower your chest to the floor, then push back up. Keep your body straight like a board."},
  {id:"incpush",  name:"Incline Push-ups",  part:"Push", emoji:"📐", base:10, unit:"reps", impact:1, tip:"Put your hands on a couch or step. Lower your chest to it, then push back up."},
  {id:"wallpush", name:"Wall Push-ups",     part:"Push", emoji:"🧱", base:12, unit:"reps", impact:1, tip:"Stand facing a wall with hands flat on it. Bend your elbows to lean in, then push back out."},
  {id:"pikepush", name:"Pike Push-ups",     part:"Push", emoji:"🔺", base:8,  unit:"reps", impact:3, tip:"Make an upside-down V with your body. Bend your arms to lower your head toward the floor, then push up."},
  {id:"dbpress",  name:"Dumbbell Shoulder Press", part:"Push", emoji:"🏋️", base:10, unit:"reps", impact:2, tip:"Hold weights at your shoulders. Push them straight up over your head, then lower slowly."},
  // PULL
  {id:"bandrow",  name:"Resistance Band Row", part:"Pull", emoji:"🎗️", base:12, unit:"reps", impact:1, tip:"Hold a band out in front of you. Pull your hands back to your ribs and squeeze your shoulder blades together."},
  {id:"dbrow",    name:"Dumbbell Bent Row",   part:"Pull", emoji:"🏋️", base:10, unit:"reps", impact:2, tip:"Lean forward a little. Pull the weights up to your sides like you're starting a lawnmower."},
  {id:"superman", name:"Superman Hold",       part:"Pull", emoji:"🦸", base:20, unit:"sec",  impact:1, tip:"Lie on your tummy. Lift your arms, chest, and legs off the floor and hold like you're flying."},
  {id:"doorrow",  name:"Doorway Rows",        part:"Pull", emoji:"🚪", base:10, unit:"reps", impact:2, tip:"Hold a doorframe and lean back with straight arms. Pull yourself toward the door, then lean back out."},
  {id:"pullup",   name:"Pull-ups",            part:"Pull", emoji:"🧗", base:6,  unit:"reps", impact:3, tip:"Hang from a bar with palms facing away. Pull your chin above the bar, then lower yourself slowly."},
  {id:"chinup",   name:"Chin-ups",            part:"Pull", emoji:"💪", base:6,  unit:"reps", impact:3, tip:"Hang from a bar with palms facing you. Pull your chin above the bar, then lower with control."},
  // LEGS
  {id:"squat",    name:"Bodyweight Squats",   part:"Legs", emoji:"🦵", base:12, unit:"reps", impact:2, tip:"Stand tall with feet apart. Sit back like there's a chair behind you, then stand back up."},
  {id:"lunge",    name:"Reverse Lunges",      part:"Legs", emoji:"🚶", base:10, unit:"reps", impact:2, tip:"Step one foot back and bend both knees. Push back up and switch legs each time."},
  {id:"glute",    name:"Glute Bridges",       part:"Legs", emoji:"🌉", base:12, unit:"reps", impact:1, tip:"Lie on your back with knees bent. Lift your hips up high, squeeze your bottom, then lower."},
  {id:"calf",     name:"Calf Raises",         part:"Legs", emoji:"🦶", base:15, unit:"reps", impact:1, tip:"Stand tall and rise up onto your tiptoes, then slowly come back down."},
  {id:"wallsit",  name:"Wall Sit",            part:"Legs", emoji:"🪑", base:25, unit:"sec",  impact:2, tip:"Lean your back on a wall and slide down like you're sitting in a chair. Hold it there!"},
  {id:"stepup",   name:"Step-ups",            part:"Legs", emoji:"🪜", base:10, unit:"reps", impact:2, tip:"Step one foot up onto a sturdy step, stand up tall, then step back down. Switch legs."},
  // CORE
  {id:"plank",    name:"Plank",               part:"Core", emoji:"🧘", base:25, unit:"sec",  impact:1, tip:"Rest on your forearms and toes. Keep your body straight and tight like a board."},
  {id:"crunch",   name:"Crunches",            part:"Core", emoji:"🔄", base:14, unit:"reps", impact:1, tip:"Lie on your back with knees bent. Curl your shoulders up toward your knees, then lower."},
  {id:"deadbug",  name:"Dead Bug",            part:"Core", emoji:"🐞", base:10, unit:"reps", impact:1, tip:"Lie on your back with arms up. Lower one arm and the opposite leg, then switch sides."},
  {id:"bicycle",  name:"Bicycle Crunches",    part:"Core", emoji:"🚲", base:16, unit:"reps", impact:2, tip:"Lie down and touch your opposite elbow to your knee, pedaling your legs like a bike."},
  {id:"legraise", name:"Leg Raises",          part:"Core", emoji:"🦿", base:10, unit:"reps", impact:2, tip:"Lie on your back with legs straight. Lift them up toward the ceiling, then lower slowly."},
  {id:"birddog",  name:"Bird Dog",            part:"Core", emoji:"🐕", base:10, unit:"reps", impact:1, tip:"On hands and knees, reach one arm forward and the opposite leg back. Then switch sides."},
  {id:"abroller", name:"Ab Roller",           part:"Core", emoji:"🎡", base:8,  unit:"reps", impact:3, tip:"Kneel and hold the roller. Roll forward as far as you can with a tight tummy, then pull yourself back."},
  {id:"russian",  name:"Russian Twists",      part:"Core", emoji:"🔃", base:16, unit:"reps", impact:2, tip:"Sit leaning back a little, feet up. Twist side to side, tapping the floor by each hip."},
  // CARDIO
  {id:"jacks",    name:"Jumping Jacks",       part:"Cardio", emoji:"⭐", base:30, unit:"sec", impact:3, tip:"Jump your feet out wide and clap your hands over your head, then jump back in."},
  {id:"knees",    name:"High Knees",          part:"Cardio", emoji:"🏃", base:25, unit:"sec", impact:3, tip:"Run in place, bringing your knees up high toward your chest."},
  {id:"climber",  name:"Mountain Climbers",   part:"Cardio", emoji:"⛰️", base:25, unit:"sec", impact:3, tip:"Get in a plank and quickly drive your knees toward your chest, one at a time."},
  {id:"march",    name:"March in Place",      part:"Cardio", emoji:"🥁", base:35, unit:"sec", impact:1, tip:"March in place, lifting your knees and swinging your arms."},
  {id:"burpee",   name:"Burpees",             part:"Cardio", emoji:"🔥", base:8,  unit:"reps",impact:3, tip:"Squat down, jump your feet back to a plank, jump them in, then jump up tall."},
  // MOBILITY
  {id:"catcow",   name:"Cat–Cow Stretch",     part:"Mobility", emoji:"🐈", base:30, unit:"sec", impact:1, tip:"On hands and knees, arch your back up like a cat, then dip it down. Move slowly."},
  {id:"armcircle",name:"Arm Circles",         part:"Mobility", emoji:"🔁", base:25, unit:"sec", impact:1, tip:"Stretch your arms out and make big slow circles, forward and then backward."},
  {id:"hipcircle",name:"Hip Circles",         part:"Mobility", emoji:"➰", base:25, unit:"sec", impact:1, tip:"Hands on your hips, make slow circles like you're spinning a hula hoop."},
  {id:"hamstr",   name:"Hamstring Stretch",   part:"Mobility", emoji:"🤸", base:30, unit:"sec", impact:1, tip:"Sit or stand and reach gently toward your toes. Feel a light stretch — don't bounce."},
  {id:"shoulder", name:"Shoulder Rolls",      part:"Mobility", emoji:"💆", base:25, unit:"sec", impact:1, tip:"Roll your shoulders up, back, and down in slow circles."},
];

/* ---------- BABY MODE ----------
   Moves that are safe & doable while holding a baby: standing, stable, no
   jumping and no hands-on-the-floor. Holding a baby adds load, so baby-mode
   sets count as harder (more XP & coins) and reps scale down a little. */
const BABY_MOVES={
  dbpress:  ["Baby Press","Hold your baby securely at your chest, then gently press them up toward the sky and lower slowly. Smile up at them!"],
  squat:    [null,"Hold your baby close to your chest like a goblet squat. Sit back as if to a chair, then stand tall."],
  lunge:    [null,"Hold your baby snug to your chest. Step one foot back, lower gently, then push back up. Go slow for balance."],
  calf:     [null,"Hold your baby close and rise onto your tiptoes, then lower slowly with control."],
  wallsit:  [null,"Back against the wall, slide down to a seated hold with your baby resting on your lap."],
  march:    [null,"March gently in place holding your baby, lifting your knees with control."],
  hipcircle:[null,"Hold your baby close and sway your hips in slow, easy circles."],
  shoulder: [null,"Hold your baby comfortably and roll your shoulders up, back, and down."]
};
EXERCISES.forEach(e=>{ const b=BABY_MOVES[e.id]; if(b){ e.baby=true; if(b[0]) e.babyName=b[0]; e.babyTip=b[1]; } });
const isBabyFriendly=e=>!!(e&&e.baby);
// fallback pools so a baby-mode workout is never empty after filtering
const BABY_FALLBACK={warm:["march","shoulder","hipcircle"], main:["squat","lunge","wallsit","calf","dbpress"], cool:["shoulder","hipcircle"]};

// Community-created exercises (loaded from the cloud) live here and are
// merged with the built-in list everywhere via allEx()/byId().
let CUSTOM_EX = [];
const allEx = () => EXERCISES.concat(CUSTOM_EX);
const byId = id => allEx().find(e=>e.id===id);
const EX_PARTS = ["Push","Pull","Legs","Core","Cardio","Mobility","Other"];

/* ---------- WORKOUT TEMPLATES (kept under ~60 min after scaling) ---------- */
const TEMPLATES = [
  {id:"fullbody", name:"Full Body Burn", emoji:"🔥", color:"var(--orange)",
   desc:"Hit every major muscle group",
   warm:["armcircle","march"], main:["squat","pushup","dbrow","glute","plank","jacks"], cool:["hamstr","catcow"]},
  {id:"upper", name:"Upper Body Power", emoji:"💪", color:"var(--coral)",
   desc:"Push, pull & shoulders",
   warm:["armcircle","shoulder"], main:["pushup","dbrow","pikepush","bandrow","superman"], cool:["shoulder","catcow"]},
  {id:"lower", name:"Legs & Glutes", emoji:"🦵", color:"var(--teal)",
   desc:"Strong legs, strong base",
   warm:["hipcircle","march"], main:["squat","lunge","glute","calf","wallsit"], cool:["hamstr","hipcircle"]},
  {id:"core", name:"Core & Stability", emoji:"🧘", color:"var(--purple)",
   desc:"Build a rock-solid midsection",
   warm:["catcow","birddog"], main:["plank","crunch","deadbug","bicycle","legraise"], cool:["catcow","hamstr"]},
  {id:"cardio", name:"Cardio Kick", emoji:"⚡", color:"var(--amber)",
   desc:"Get the heart pumping",
   warm:["march","armcircle"], main:["jacks","knees","climber","squat","burpee"], cool:["hamstr","shoulder"]},
  {id:"mobility", name:"Mobility & Recovery", emoji:"🌿", color:"var(--green)",
   desc:"Gentle flow — great any day",
   warm:["march"], main:["catcow","armcircle","hipcircle","birddog","glute","hamstr"], cool:["shoulder"]},
];

/* ---------- BADGES ----------  coins = one-time currency lump sum on unlock */
const BADGES = [
  {id:"first",   e:"🌱", n:"First Step",    test:s=>s.workouts>=1,   d:"Complete 1 workout",            coins:30},
  {id:"five",    e:"🖐️", n:"High Five",      test:s=>s.workouts>=5,   d:"Complete 5 workouts",           coins:60},
  {id:"ten",     e:"💥", n:"Double Digits",  test:s=>s.workouts>=10,  d:"Complete 10 workouts",          coins:120},
  {id:"streak3", e:"🔥", n:"On Fire",        test:s=>s.bestStreak>=3, d:"3-day streak",                  coins:50},
  {id:"streak7", e:"⚡", n:"Unstoppable",    test:s=>s.bestStreak>=7, d:"7-day streak",                  coins:140},
  {id:"xp500",   e:"⭐", n:"Rising Star",    test:s=>s.xp>=500,       d:"Earn 500 XP",                   coins:80},
  {id:"xp1500",  e:"🌟", n:"All-Star",       test:s=>s.xp>=1500,      d:"Earn 1500 XP",                  coins:220},
  {id:"allround",e:"🎯", n:"Well Rounded",   test:s=>s.types>=4,      d:"Try 4 workout types",           coins:90},
  {id:"early",   e:"🌅", n:"Early Bird",     test:s=>s.early,         d:"Finish before 8am",             coins:60},
  {id:"perfect", e:"💯", n:"Perfectionist",  test:s=>s.perfect,       d:"Finish every set in a workout", coins:75},
];

/* ---------- LEVELS ---------- */
const levelFor = xp => Math.floor(Math.sqrt(xp/50))+1;
const xpForLevel = lvl => 50*(lvl-1)*(lvl-1);

/* ============================================================
   DATA LAYER  —  Supabase cloud  OR  localStorage fallback
   ============================================================ */
const CFG_KEY="fitcircle_cfg", LOCAL_KEY="fitcircle_local", ME_KEY="fitcircle_me";
// Default cloud project (can be overridden in Settings)
const DEFAULT_CFG={
  url:"https://yoxuokmhnnmtqtuncckw.supabase.co",
  key:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlveHVva21obm5tdHF0dW5jY2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Njc5NjEsImV4cCI6MjA5NzA0Mzk2MX0.oU8R8FTKMVMxKaHlnTxGhhz_sLFiANr955SbvqN8pP4"
};
// Always connect to the shared cloud project — no manual setup for users.
let cfg = DEFAULT_CFG;
let sb = null;
function initSB(){
  if(cfg && cfg.url && cfg.key && window.supabase){
    try{ sb = window.supabase.createClient(cfg.url, cfg.key); return true; }catch(e){ console.warn(e); }
  }
  sb=null; return false;
}
const isCloud = ()=>!!sb;

/* local store helpers */
function lget(){ return JSON.parse(localStorage.getItem(LOCAL_KEY)||'{"profiles":[],"logs":[]}'); }
function lset(d){ localStorage.setItem(LOCAL_KEY, JSON.stringify(d)); }
const uid = ()=> 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36);

const DB = {
  async getProfiles(){
    if(isCloud()){
      const {data,error}=await sb.from('profiles').select('*').order('xp',{ascending:false});
      if(error) throw error; return data||[];
    }
    return lget().profiles.slice().sort((a,b)=>b.xp-a.xp);
  },
  async createProfile(p){
    const rec={name:p.name,age_group:p.age_group,avatar:p.avatar,color:p.color,
               xp:0,streak:0,best_streak:0,last_workout:null};
    if(isCloud()){
      const {data,error}=await sb.from('profiles').insert(rec).select().single();
      if(error) throw error; return data;
    }
    rec.id=uid(); rec.created_at=new Date().toISOString();
    const d=lget(); d.profiles.push(rec); lset(d); return rec;
  },
  async updateProfile(id,fields){
    if(isCloud()){ const {error}=await sb.from('profiles').update(fields).eq('id',id); if(error) throw error; return; }
    const d=lget(); const p=d.profiles.find(x=>x.id===id); if(p) Object.assign(p,fields); lset(d);
  },
  async deleteProfile(id){
    if(isCloud()){ await sb.from('workout_logs').delete().eq('profile_id',id); await sb.from('profiles').delete().eq('id',id); return; }
    const d=lget(); d.profiles=d.profiles.filter(x=>x.id!==id); d.logs=d.logs.filter(l=>l.profile_id!==id); lset(d);
  },
  async getLogs(profileId){
    if(isCloud()){
      let q=sb.from('workout_logs').select('*').order('created_at',{ascending:false});
      if(profileId) q=q.eq('profile_id',profileId);
      const {data,error}=await q; if(error) throw error; return data||[];
    }
    let logs=lget().logs.slice().sort((a,b)=>(b.created_at>a.created_at?1:-1));
    if(profileId) logs=logs.filter(l=>l.profile_id===profileId);
    return logs;
  },
  async addLog(log){
    if(isCloud()){ const {data,error}=await sb.from('workout_logs').insert(log).select().single(); if(error) throw error; return data; }
    log.id=uid(); log.created_at=new Date().toISOString();
    const d=lget(); d.logs.push(log); lset(d); return log;
  },
  async deleteLog(id){
    if(isCloud()){ const {error}=await sb.from('workout_logs').delete().eq('id',id); if(error) throw error; return; }
    const d=lget(); d.logs=d.logs.filter(l=>l.id!==id); lset(d);
  },
  /* ---- shared community exercise library ---- */
  async getCustomExercises(){
    if(isCloud()){ const {data,error}=await sb.from('custom_exercises').select('*').order('created_at',{ascending:true}); if(error) throw error; return data||[]; }
    try{ return JSON.parse(localStorage.getItem('fitcircle_cex')||'[]'); }catch(e){ return []; }
  },
  async addCustomExercise(ex){
    if(isCloud()){ const {data,error}=await sb.from('custom_exercises').insert(ex).select().single(); if(error) throw error; return data; }
    ex.created_at=new Date().toISOString(); const a=JSON.parse(localStorage.getItem('fitcircle_cex')||'[]'); a.push(ex); localStorage.setItem('fitcircle_cex',JSON.stringify(a)); return ex;
  },
  async deleteCustomExercise(id){
    if(isCloud()){ const {error}=await sb.from('custom_exercises').delete().eq('id',id); if(error) throw error; return; }
    const a=JSON.parse(localStorage.getItem('fitcircle_cex')||'[]').filter(e=>e.id!==id); localStorage.setItem('fitcircle_cex',JSON.stringify(a));
  },
  async updateCustomExercise(id, fields){
    if(isCloud()){ const {error}=await sb.from('custom_exercises').update(fields).eq('id',id); if(error) throw error; return; }
    const a=JSON.parse(localStorage.getItem('fitcircle_cex')||'[]'); const e=a.find(x=>x.id===id); if(e) Object.assign(e,fields); localStorage.setItem('fitcircle_cex',JSON.stringify(a));
  },
  /* ---- shared community workout plans ---- */
  async getSharedWorkouts(){
    if(isCloud()){ const {data,error}=await sb.from('shared_workouts').select('*').order('created_at',{ascending:false}); if(error) throw error; return data||[]; }
    try{ return JSON.parse(localStorage.getItem('fitcircle_sw')||'[]'); }catch(e){ return []; }
  },
  async addSharedWorkout(wk){
    if(isCloud()){ const {data,error}=await sb.from('shared_workouts').insert(wk).select().single(); if(error) throw error; return data; }
    wk.created_at=new Date().toISOString(); const a=JSON.parse(localStorage.getItem('fitcircle_sw')||'[]'); a.unshift(wk); localStorage.setItem('fitcircle_sw',JSON.stringify(a)); return wk;
  }
};

function fmtClock(ms){ const s=Math.max(0,Math.floor(ms/1000)); const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }

/* ---- Rest-time preferences (per profile). Stored on the profile in the
   cloud when those columns exist, and mirrored to localStorage so it works
   instantly and offline. Falls back to the age-group default. ---- */
function restKey(id){ return "fitcircle_rest_"+id; }
function getRestPref(id){ try{ return JSON.parse(localStorage.getItem(restKey(id))||"null"); }catch(e){ return null; } }
function setRestPref(id,setS,exS){ localStorage.setItem(restKey(id),JSON.stringify({set:setS,ex:exS})); }
function effectiveRest(p){
  const ag=AGE_GROUPS[p.age_group]||AGE_GROUPS.adult, pref=getRestPref(p.id);
  const setR = Number.isFinite(p.rest_set) ? p.rest_set : (pref? pref.set : ag.restSet);
  const exR  = Number.isFinite(p.rest_ex)  ? p.rest_ex  : (pref? pref.ex  : ag.restEx);
  return {set:setR, ex:exR};
}

/* ---- Saved custom workouts + home-page layout (order + hidden).
   Cloud-synced via optional jsonb columns, mirrored to localStorage. ---- */
function cwKey(id){ return "fitcircle_cw_"+id; }
function hpKey(id){ return "fitcircle_home_"+id; }
function getCustoms(p){
  if(p && Array.isArray(p.custom_workouts)) return p.custom_workouts;
  try{ return JSON.parse(localStorage.getItem(cwKey(p.id))||"[]"); }catch(e){ return []; }
}
async function saveCustoms(p, arr){
  localStorage.setItem(cwKey(p.id), JSON.stringify(arr)); p.custom_workouts=arr;
  try{ await DB.updateProfile(p.id,{custom_workouts:arr}); }catch(e){}
}
function getHomePrefs(p){
  let v=null;
  if(p && p.home_prefs && typeof p.home_prefs==="object") v=p.home_prefs;
  else { try{ v=JSON.parse(localStorage.getItem(hpKey(p.id))||"null"); }catch(e){} }
  return (v && Array.isArray(v.order)) ? {order:v.order, hidden:v.hidden||[]} : {order:[], hidden:[]};
}
async function saveHomePrefs(p, prefs){
  localStorage.setItem(hpKey(p.id), JSON.stringify(prefs)); p.home_prefs=prefs;
  try{ await DB.updateProfile(p.id,{home_prefs:prefs}); }catch(e){}
}
/* ordered list of every workout (templates + customs) for this profile */
function allWorkouts(p){
  const customs=getCustoms(p), all=[...TEMPLATES, ...customs], prefs=getHomePrefs(p);
  const byKey={}; all.forEach(t=>byKey[t.id]=t);
  const ordered=[];
  prefs.order.forEach(k=>{ if(byKey[k]){ ordered.push(byKey[k]); delete byKey[k]; } });
  all.forEach(t=>{ if(byKey[t.id]){ ordered.push(t); delete byKey[t.id]; } }); // new ones appended
  return ordered;
}
const isCustomKey=k=>typeof k==="string" && k.indexOf("cw-")===0;

const AV_DEFAULT={skin:"#eeb086",gender:"neutral",hair:"short",hairColor:"#2b2b35",glasses:"none",
  outfit:"tee",outfitColor:"#4d7cff",hat:"none",accessory:"none",pet:"none",bg:"mint"};

function avKey(id){ return "fitcircle_av_"+id; }   // {coins, owned:[], cfg:{}}
function avStore(p){
  let v=null;
  if(p && (p.coins!=null || p.owned || p.avatar_cfg)){
    v={coins:p.coins||0, owned:Array.isArray(p.owned)?p.owned:[], cfg:(p.avatar_cfg&&typeof p.avatar_cfg==="object")?p.avatar_cfg:{}};
  } else { try{ v=JSON.parse(localStorage.getItem(avKey(p.id))||"null"); }catch(e){} }
  return v||{coins:0, owned:[], cfg:{}};
}
function getCoins(p){ return avStore(p).coins||0; }
function getOwned(p){ return avStore(p).owned||[]; }
function isOwned(p,item){ return item.cost===0 || getOwned(p).indexOf(item.id)>=0; }
function rawCfg(p){ const c=avStore(p).cfg; return (c&&typeof c==="object")?c:{}; }
function getCoined(p){ const c=rawCfg(p); return Array.isArray(c._coined)?c._coined:[]; }
/* normalized, validated avatar config (legacy emoji configs fall back to defaults) */
function getCfg(p){
  const c=rawCfg(p), out=Object.assign({},AV_DEFAULT);
  if(SKIN_TONES.some(s=>s.val===c.skin)) out.skin=c.skin;
  if(GENDERS.some(g=>g.id===c.gender)) out.gender=c.gender;
  if(HAIR_COLORS.includes(c.hairColor)) out.hairColor=c.hairColor;
  if(OUTFIT_COLORS.includes(c.outfitColor)) out.outfitColor=c.outfitColor;
  ["hair","glasses","outfit","hat","accessory","pet","bg"].forEach(sl=>{ if(optsFor(sl).includes(c[sl])) out[sl]=c[sl]; });
  return out;
}
async function avSave(p, next){   // next: partial {coins, owned, cfg}
  const cur=avStore(p);
  const merged={coins: next.coins!=null?next.coins:cur.coins, owned: next.owned||cur.owned, cfg: next.cfg||cur.cfg};
  localStorage.setItem(avKey(p.id), JSON.stringify(merged));
  p.coins=merged.coins; p.owned=merged.owned; p.avatar_cfg=merged.cfg;
  try{ await DB.updateProfile(p.id,{coins:merged.coins, owned:merged.owned, avatar_cfg:merged.cfg}); }catch(e){}
}
async function setCfg(p, patch){ const c=Object.assign({}, rawCfg(p), patch); await avSave(p,{cfg:c}); }
async function addCoins(p, amt){ await avSave(p,{coins:getCoins(p)+amt}); }

/* award one-time coin lump sums for any newly-earned (unpaid) achievements */
async function awardBadgeCoins(s){
  if(!s){ const logs=await DB.getLogs().catch(()=>[]); s=statsFrom(ME,logs); }
  const earned=BADGES.filter(b=>b.test(s));
  const paid=getCoined(ME);
  const fresh=earned.filter(b=>!paid.includes(b.id));
  if(!fresh.length) return {total:0, fresh:[]};
  const total=fresh.reduce((a,b)=>a+(b.coins||0),0);
  const c=Object.assign({}, rawCfg(ME), {_coined: paid.concat(fresh.map(b=>b.id))});
  await avSave(ME,{coins:getCoins(ME)+total, cfg:c});
  return {total, fresh};
}

/* ---- Progression: most-recent achieved reps/seconds per exercise ---- */
function computePRs(logs){
  const map={};
  const mine=logs.filter(l=>l.profile_id===ME.id)
    .sort((a,b)=> (a.created_at||"")<(b.created_at||"")?1:-1); // newest first
  for(const l of mine){
    const ex=l.details && l.details.ex;
    if(!Array.isArray(ex)) continue;
    for(const r of ex){ if(!map[r.id] && r.best>0) map[r.id]={best:r.best, unit:r.unit}; }
  }
  return map;
}
async function loadPRs(){ const logs=await DB.getLogs(ME.id).catch(()=>[]); MYPR=computePRs(logs); return MYPR; }

/* recompute streaks from a sorted, de-duped list of workout dates */
function streaksFromDates(dates){
  if(!dates.length) return {streak:0, best:0, last:null};
  let best=1, trail=1;
  for(let i=1;i<dates.length;i++){ const g=daysBetween(dates[i-1],dates[i]); if(g===1){trail++;}else if(g!==0){trail=1;} best=Math.max(best,trail); }
  return {streak:trail, best, last:dates[dates.length-1]};
}
/* delete one workout log and roll back its effect on XP / streak */
async function deleteLogAndRecompute(logId){
  const before=await DB.getLogs(ME.id).catch(()=>[]);
  const gone=before.find(l=>l.id===logId);
  const coinsBack=(gone&&gone.details&&gone.details.coins)||0;
  await DB.deleteLog(logId);
  const logs=before.filter(l=>l.id!==logId);
  const xp=logs.reduce((a,l)=>a+(l.xp_earned||0),0);
  const dates=[...new Set(logs.map(l=>l.date))].sort();
  const st=streaksFromDates(dates);
  const coins=Math.max(0, getCoins(ME)-coinsBack);
  try{ await DB.updateProfile(ME.id,{xp, streak:st.streak, best_streak:st.best, last_workout:st.last}); }catch(e){}
  await avSave(ME,{coins});
  ME.xp=xp; ME.streak=st.streak; ME.best_streak=st.best; ME.last_workout=st.last;
  PROFILES=await DB.getProfiles().catch(()=>PROFILES); ME=PROFILES.find(p=>p.id===ME.id)||ME;
}
const CHALLENGE_STEP=ex=>ex.unit==="sec"?5:2;   // extra on the challenge set
const PROGRESS_STEP=ex=>ex.unit==="sec"?5:1;    // steady week-over-week bump

/* ---- Baby mode preference (per profile, stored locally) ---- */
function babyKey(id){ return "fitcircle_baby_"+id; }
function getBaby(p){ p=p||ME; if(!p) return false; try{ return localStorage.getItem(babyKey(p.id))==="1"; }catch(e){ return false; } }

/* build a scaled, runnable workout from a template + age group.
   Main exercises progress from your last result and the final set is a
   "challenge set" with a few extra reps/seconds so it's never the same.
   In baby mode, only baby-friendly moves are used and reps scale down a
   little because holding a baby makes every rep harder. */
function buildWorkout(tpl, ageKey){
  const ag=AGE_GROUPS[ageKey];
  const baby=getBaby(ME);
  const rest=ME?effectiveRest(ME):{set:ag.restSet, ex:ag.restEx};
  const mk=(e,role)=>{
    const sets = role==="warm"||role==="cool" ? 1 : ag.sets;
    const scaled = Math.max(e.unit==="sec"?10:4, Math.round(e.base*(role==="main"?ag.repMul:0.9)));
    let base=scaled, lastBest=null;
    if(role==="main"){
      const pr=MYPR[e.id];
      if(pr && pr.best>0){
        lastBest=pr.best;
        const cap=Math.round(e.base*ag.repMul*1.8);       // keep workouts under ~1 hour
        base=Math.min(cap, pr.best + PROGRESS_STEP(e));   // beat your last result
      }
    }
    if(baby) base=Math.max(e.unit==="sec"?10:4, Math.round(base*0.9)); // added load → fewer, harder reps
    // per-set targets; the last main set gets a challenge bump
    const targets=[];
    for(let i=0;i<sets;i++){
      const challenge = role==="main" && sets>1 && i===sets-1;
      targets.push(challenge ? base + CHALLENGE_STEP(e) : base);
    }
    return {ex:e, sets, baseTarget:base, targets, unit:e.unit, restSet:rest.set, role, lastBest, baby};
  };
  const sect=(ids,role)=> ids
    .map(byId).filter(Boolean)
    // skip very high-impact moves for low-impact groups
    .filter(e=> !(ag.impact===1 && e.impact===3 && role==="main"))
    // in baby mode, keep only moves you can do holding a baby
    .filter(e=> !baby || isBabyFriendly(e))
    .map(e=>mk(e,role));
  let warm=sect(tpl.warm,"warm"), main=sect(tpl.main,"main"), cool=sect(tpl.cool,"cool");
  if(baby){
    // make sure filtering never leaves an empty/too-short workout
    const have=new Set(main.map(it=>it.ex.id));
    for(const id of BABY_FALLBACK.main){ if(main.length>=4) break; if(!have.has(id)){ const e=byId(id); if(e){ main.push(mk(e,"main")); have.add(id); } } }
    if(!warm.length) warm=BABY_FALLBACK.warm.map(byId).filter(Boolean).map(e=>mk(e,"warm"));
    if(!cool.length) cool=BABY_FALLBACK.cool.map(byId).filter(Boolean).map(e=>mk(e,"cool"));
  }
  return {tpl, ageKey, baby, warm, main, cool, restEx:rest.ex};
}
function estMinutes(w){
  let sec=0;
  [...w.warm,...w.main,...w.cool].forEach(it=>{
    it.targets.forEach(t=>{ sec += (it.unit==="sec"? t : t*3); }); // ~3s per rep
    sec += (it.sets-1)*it.restSet + w.restEx;
  });
  return Math.max(8, Math.round(sec/60));
}

/* aggregate stats for a profile from its logs */
function statsFrom(profile, logs){
  const mine=logs.filter(l=>l.profile_id===profile.id);
  const types=new Set(mine.map(l=>l.workout_name)).size;
  let early=false, perfect=false;
  mine.forEach(l=>{ if(l.details&&l.details.early) early=true; if(l.done_sets&&l.total_sets&&l.done_sets===l.total_sets) perfect=true; });
  return {workouts:mine.length, xp:profile.xp, bestStreak:profile.best_streak, streak:profile.streak, types, early, perfect};
}

/* recompute streak based on logs + last_workout */
async function refreshStreak(logs){
  const mine=logs.filter(l=>l.profile_id===ME.id);
  if(!mine.length){ return; }
  if(ME.last_workout){
    const gap=daysBetween(ME.last_workout,todayStr());
    if(gap>1 && ME.streak!==0){ ME.streak=0; await DB.updateProfile(ME.id,{streak:0}); }
  }
}

/* ---------- ORGANIZE HOME PAGE (reorder / hide / delete) ---------- */
async function renderOrganize(){
  let order=allWorkouts(ME).map(t=>t.id);
  const prefs=getHomePrefs(ME); let hidden=new Set(prefs.hidden);
  const meta=k=> TEMPLATES.find(t=>t.id===k) || getCustoms(ME).find(c=>c.id===k);
  app().innerHTML=`
   <div class="fade">
    <div class="topbar"><div class="logo"><span class="dot"></span>Organize home</div>
      <button class="btn sm alt" id="og_done">Done</button></div>
    <p class="muted" style="margin:0 0 14px">Reorder with ▲▼, tap 👁 to hide a workout from your home page, or 🗑 to delete a custom one.</p>
    <div id="og_list"></div>
   </div>`;
  async function persist(){ await saveHomePrefs(ME,{order, hidden:[...hidden]}); }
  function draw(){
    const list=$("#og_list"); list.innerHTML="";
    order.forEach((k,i)=>{
      const t=meta(k); if(!t) return;
      const isHidden=hidden.has(k), custom=isCustomKey(k);
      const row=document.createElement("div"); row.className="card"; row.style.cssText="padding:10px;margin-bottom:8px;opacity:"+(isHidden?".5":"1");
      row.innerHTML=`<div class="row" style="gap:8px">
          <div class="wico" style="width:38px;height:38px;font-size:18px;background:${t.color}22;color:${t.color}">${t.emoji}</div>
          <div style="flex:1"><div style="font-weight:700;font-size:15px">${esc(t.name)}${custom?' <span class="tag">custom</span>':''}</div>
            <div class="muted" style="font-size:11px">${isHidden?"Hidden":"On home page"}</div></div>
          <button class="og-up btn sm alt" style="padding:6px 9px" ${i===0?"disabled":""}>▲</button>
          <button class="og-dn btn sm alt" style="padding:6px 9px" ${i===order.length-1?"disabled":""}>▼</button>
          <button class="og-eye btn sm alt" style="padding:6px 9px">${isHidden?"🙈":"👁"}</button>
          ${custom?'<button class="og-share btn sm alt" style="padding:6px 9px" title="Share with squad">📤</button>':""}
          ${custom?'<button class="og-del btn sm alt" style="padding:6px 9px;color:var(--coral)">🗑</button>':""}
        </div>`;
      row.querySelector(".og-up").onclick=async()=>{ if(i>0){ [order[i-1],order[i]]=[order[i],order[i-1]]; await persist(); draw(); } };
      row.querySelector(".og-dn").onclick=async()=>{ if(i<order.length-1){ [order[i+1],order[i]]=[order[i],order[i+1]]; await persist(); draw(); } };
      row.querySelector(".og-eye").onclick=async()=>{ if(hidden.has(k)) hidden.delete(k); else hidden.add(k); await persist(); draw(); };
      const sh=row.querySelector(".og-share");
      if(sh) sh.onclick=async()=>{ if(!confirm("Share “"+t.name+"” with your whole squad?")) return;
        sh.textContent="…";
        try{ await DB.addSharedWorkout({id:"sw-"+Date.now().toString(36), name:t.name, emoji:t.emoji, color:t.color, descr:t.desc||"", main:t.main, warm:t.warm||["march"], cool:t.cool||["hamstr"], created_by:ME.name}); toast("Shared with the squad 🌐"); }
        catch(e){ alert("Could not share: "+e.message); } draw(); };
      const del=row.querySelector(".og-del");
      if(del) del.onclick=async()=>{ if(!confirm("Delete the custom workout “"+t.name+"”?")) return;
        const arr=getCustoms(ME).filter(c=>c.id!==k); await saveCustoms(ME,arr);
        order=order.filter(x=>x!==k); hidden.delete(k); await persist(); draw(); };
      list.appendChild(row);
    });
    if(!order.length) list.innerHTML=`<div class="card center muted">No workouts yet.</div>`;
  }
  draw();
  $("#og_done").onclick=()=>go("home");
}

/* ============================================================
   WORKOUT RUNNER  (sets, check-off, edit reps, rest timers)
   ============================================================ */
function startWorkout(w){
  const items=[...w.warm,...w.main,...w.cool].map(it=>({...it,
    done:Array(it.sets).fill(false), reps:it.targets.slice()}));
  SESSION={w, items, idx:0, startTs:Date.now()};
  FINISHING=false;
  renderRunner();
}
function totalSets(){ return SESSION.items.reduce((a,it)=>a+it.sets,0); }
function doneSets(){ return SESSION.items.reduce((a,it)=>a+it.done.filter(Boolean).length,0); }

function startClock(){
  clearInterval(WORKOUT_CLOCK);
  WORKOUT_CLOCK=setInterval(()=>{ const el=$("#rn_clock"); if(el && SESSION) el.textContent="⏱️ "+fmtClock(Date.now()-SESSION.startTs); },1000);
}
function stopClock(){ clearInterval(WORKOUT_CLOCK); WORKOUT_CLOCK=null; }

function renderRunner(){

  const isTimed=it.unit==="sec";
  app().innerHTML=`
   <div class="fade">

      <button class="btn sm alt" id="rn_quit">✕ Quit</button>
      <span class="pill" id="rn_clock">⏱️ ${fmtClock(Date.now()-s.startTs)}</span>

    </div>
    <div class="muted center" style="font-size:11px;margin:-6px 0 10px">${s.w.tpl.name} · total time</div>
    <div class="bar" style="margin-bottom:16px"><i style="width:${pct}%"></i></div>

      <h2 style="font-size:22px">${exName}</h2>
      <div class="muted" style="margin-top:6px">${it.sets} set${it.sets>1?"s":""} ·
        ${it.baseTarget} ${isTimed?"sec hold":"reps"} · ${it.restSet}s rest</div>
      ${baby?`<div class="pill" style="margin-top:10px;color:var(--coral)">👶 Holding baby — counts as harder, earns more</div>`:""}
      ${it.lastBest!=null?`<div class="pill" style="margin-top:10px;color:var(--teal)">📈 Last time ${it.lastBest} → today ${it.baseTarget} (+${PROGRESS_STEP(e)} ${isTimed?"sec":"rep"})</div>`:(it.role==="main"?`<div class="pill" style="margin-top:10px">🎯 First time — set your baseline</div>`:"")}
    </div>

    <div class="card" style="margin-bottom:16px;background:var(--card2);border-color:var(--line)">
      <div class="exhead" style="color:var(--teal)">📖 How to do it</div>

    </div>

    <div class="exhead" style="margin:0 2px 10px">Sets — ${isTimed?"tap ▶ to start the timer, or check off":"check off or edit if you fell short"}</div>
    <div id="rn_sets"></div>

    <button class="btn" style="margin-top:8px" id="rn_next">${s.idx<s.items.length-1?"Next exercise →":"Finish workout 🎉"}</button>
   </div>`;
  const sw=$("#rn_sets");
  for(let i=0;i<it.sets;i++){
    const tgt=it.targets[i];
    const isChallenge = it.role==="main" && it.sets>1 && i===it.sets-1;
    const row=document.createElement("div"); row.className="setrow"+(it.done[i]?" done":"");
    const startBtn = isTimed && !it.done[i]
      ? `<button class="btn sm teal rn_start" style="padding:8px 12px">▶ ${tgt}s</button>` : "";
    row.innerHTML=`<button class="check">${it.done[i]?"✓":""}</button>
      <div style="flex:1"><span style="font-weight:700">Set ${i+1}</span>
        ${isChallenge?` <span class="tag" style="background:#ff4d6d33;color:#ff7a93">🔥 challenge ${tgt}</span>`:` <span class="muted" style="font-size:12px">goal ${tgt}</span>`}</div>
      ${startBtn}
      <input class="repedit" type="number" min="0" value="${it.reps[i]}" />
      <span class="muted" style="font-size:13px;width:34px">${isTimed?"sec":"reps"}</span>`;
    const check=row.querySelector(".check"), inp=row.querySelector(".repedit");
    inp.onchange=()=>{ it.reps[i]=Math.max(0,parseInt(inp.value)||0); };
    const markDone=()=>{ it.done[i]=true; if(i<it.sets-1) startRest(it.restSet,"Rest before set "+(i+2),()=>renderRunner()); else renderRunner(); };
    check.onclick=()=>{
      it.done[i]=!it.done[i]; row.classList.toggle("done",it.done[i]); check.textContent=it.done[i]?"✓":"";
      if(it.done[i] && i<it.sets-1){ startRest(it.restSet,"Rest before set "+(i+2)); }

    sw.appendChild(row);
  }
  startClock();
  $("#rn_quit").onclick=()=>{ if(confirm("Quit this workout? Progress won't be saved.")){ stopClock(); SESSION=null; showApp(); } };
  $("#rn_next").onclick=()=>{
    if(s.idx<s.items.length-1){

      startRest(s.w.restEx, restMsg, renderRunner);
    } else { const b=$("#rn_next"); b.disabled=true; b.textContent="Saving…"; stopClock(); finishWorkout(); }
  };
}

/* full-screen countdown timer for a time-based set */
function startTimer(sec, ex, label, onDone){
  let left=sec, paused=false; const total=sec;
  const ov=document.createElement("div"); ov.className="rest";
  ov.innerHTML=`<div style="font-size:40px;margin-bottom:4px">${ex.emoji}</div>
    <div class="exhead" style="color:var(--orange)">${esc(ex.name)}</div>
    <div class="muted" style="font-size:12px;margin-bottom:6px">${esc(label||"")}</div>
    <div class="ring" id="t_n" style="color:var(--orange)">${left}</div>
    <div class="muted" style="margin:6px 24px 20px;max-width:340px;line-height:1.5">${esc(ex.tip||"")}</div>
    <div class="row" style="gap:10px">
      <button class="btn sm alt" id="t_pause">⏸ Pause</button>
      <button class="btn sm alt" id="t_plus">+10s</button>
    </div>
    <button class="btn teal" style="max-width:240px;margin-top:18px" id="t_done">Done ✓</button>
    <button class="btn alt" style="max-width:240px;margin-top:10px" id="t_cancel">Cancel</button>`;
  document.body.appendChild(ov);
  const tick=setInterval(()=>{ if(paused) return; left--; $("#t_n").textContent=Math.max(0,left); if(left<=0) finish(false); },1000);
  function close(){ clearInterval(tick); ov.remove(); }
  function finish(cancelled){ close(); if(!cancelled && onDone) onDone(cancelled?0:Math.max(1,total-Math.max(0,left))); }
  $("#t_pause",ov).onclick=()=>{ paused=!paused; $("#t_pause").textContent=paused?"▶ Resume":"⏸ Pause"; };
  $("#t_plus",ov).onclick=()=>{ left+=10; $("#t_n").textContent=left; };
  $("#t_done",ov).onclick=()=>finish(false);
  $("#t_cancel",ov).onclick=()=>finish(true);
}

/* rest overlay with skip + ±15s */
function startRest(sec, msg, after){
  let left=sec; const ov=document.createElement("div"); ov.className="rest";
  ov.innerHTML=`<div class="exhead" style="color:var(--teal)">Rest</div>
    <div class="ring" id="rest_n">${left}</div>
    <div class="muted" style="margin:6px 0 22px">${esc(msg||"")}</div>
    <div class="row" style="gap:10px">
      <button class="btn sm alt" id="rest_minus">−15s</button>
      <button class="btn sm alt" id="rest_plus">+15s</button>
    </div>
    <button class="btn teal" style="max-width:240px;margin-top:18px" id="rest_skip">Skip rest →</button>`;
  document.body.appendChild(ov);
  const tick=setInterval(()=>{ left--; $("#rest_n").textContent=Math.max(0,left); if(left<=0) finish(); },1000);
  function finish(){ clearInterval(tick); ov.remove(); if(after) after(); }
  ov.querySelector("#rest_skip").onclick=finish;
  ov.querySelector("#rest_minus").onclick=()=>{ left=Math.max(1,left-15); $("#rest_n").textContent=left; };
  ov.querySelector("#rest_plus").onclick=()=>{ left+=15; $("#rest_n").textContent=left; };
}

async function finishWorkout(){
  if(FINISHING || !SESSION) return;   // guard against double-tap / re-entry
  FINISHING=true;
  const s=SESSION, tot=totalSets(), done=doneSets();
  const baby=!!s.w.baby;
  const mins=Math.max(1,Math.round((Date.now()-s.startTs)/60000));
  // XP: 10 per completed set + completion bonus, weekly bonus handled separately
  let xp=done*10 + 30;
  const perfect = done===tot;
  if(perfect) xp+=40;
  if(baby) xp+=done*5;        // holding a baby is harder — extra XP per set
  const early = new Date().getHours()<8;
  // coins: harder exercises (higher impact) pay more per completed set;
  // holding a baby adds load, so each baby set counts as one impact level higher
  let coins=0;
  s.items.forEach(it=>{ const dn=it.done.filter(Boolean).length; coins += dn*((it.ex.impact||1)+(baby?1:0))*2; });
  coins += perfect?15:5;
  // per-exercise best result (for progression next time)
  const exResults=s.items.filter(it=>it.role==="main").map(it=>{
    const doneReps=it.reps.filter((r,idx)=>it.done[idx]);
    return {id:it.ex.id, name:it.ex.name, unit:it.unit, best:doneReps.length?Math.max(...doneReps):0};
  }).filter(r=>r.best>0);
  const details={early, perfect, baby, parts:[...new Set(s.items.map(i=>i.ex.part))], ex:exResults, coins};
  // streak
  let streak=ME.streak||0, best=ME.best_streak||0;
  if(ME.last_workout!==todayStr()){
    const gap=ME.last_workout?daysBetween(ME.last_workout,todayStr()):999;
    streak = gap===1 ? streak+1 : 1;
  } else { streak=Math.max(1,streak); }
  best=Math.max(best,streak);
  const newXP=(ME.xp||0)+xp;

  const log={profile_id:ME.id, workout_name:s.w.tpl.name, date:todayStr(),
    duration_min:mins, xp_earned:xp, total_sets:tot, done_sets:done, details};
  try{
    await DB.addLog(log);
    await DB.updateProfile(ME.id,{xp:newXP,streak,best_streak:best,last_workout:todayStr()});
  }catch(e){ alert("Save failed: "+e.message); }
  ME.xp=newXP; ME.streak=streak; ME.best_streak=best; ME.last_workout=todayStr();
  await addCoins(ME, coins);   // bank the coins earned
  PROFILES=await DB.getProfiles().catch(()=>PROFILES);
  ME=PROFILES.find(p=>p.id===ME.id)||ME;
  await loadPRs();           // refresh progression for next time
  SESSION=null; FINISHING=false;
  renderSummary({xp,mins,done,tot,perfect,streak,coins,baby});
}

/* ---------- WEEKLY CHALLENGE ---------- */
function startOfWeek(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
function weeklyChallenge(mine){
  const sow=startOfWeek();
  const wk=mine.filter(l=>l.date>=sow);
  const goal=4, cur=wk.length;
  return {label:"Complete 4 workouts this week", goal, cur, pct:Math.round(cur/goal*100), done:cur>=goal, reward:150};
}

      row.innerHTML=`<div class="rank">${medals[i]||(i+1)}</div>
        ${avatarHTML(p,40)}
        <div style="flex:1"><div style="font-weight:800">${esc(p.name)}${isMe?' <span class="tag" style="background:'+ME.color+'33;color:'+ME.color+'">you</span>':''}</div>
        <div class="muted" style="font-size:12px">${ag.label} · Lv ${levelFor(p.xp)}</div></div>
        <span class="chip">${metric}</span>`;
      list.appendChild(row);
    });
    if(!arr.length) list.innerHTML=`<div class="card center muted">No squad members yet.</div>`;
  }
  draw("xp");
  $("#lb_seg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $("#lb_seg").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); draw(b.dataset.m);
  });
}

/* ---------- BADGES ---------- */
async function renderBadges(){
  const logs=await DB.getLogs().catch(()=>[]);
  const s=statsFrom(ME,logs);
  const award=await awardBadgeCoins(s);            // backfill any unpaid achievements
  if(award.total>0) toast(`+${award.total} 🪙 from achievements!`);
  const coined=getCoined(ME);
  const earned=BADGES.filter(b=>b.test(s)).length;
  app().innerHTML=`
   <div class="fade">
    <div class="topbar"><div class="logo"><span class="dot"></span>Badges</div>
      <span class="pill">${earned}/${BADGES.length}</span></div>
    <div class="card" style="margin-bottom:16px">
      <div class="row between"><div style="font-weight:800;font-size:17px">${esc(ME.name)}'s achievements</div>
        <span class="chip">🪙 ${getCoins(ME)}</span></div>
      <div class="bar" style="margin-top:10px"><i style="width:${Math.round(earned/BADGES.length*100)}%"></i></div>
      <div class="muted" style="font-size:12px;margin-top:6px">${earned} unlocked · each one pays a coin bonus</div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(3,1fr)" id="bg"></div>
   </div>`;
  const g=$("#bg");
  BADGES.forEach(b=>{
    const has=b.test(s);
    const d=document.createElement("div"); d.className="badge"+(has?"":" locked");
    const reward = has
      ? `<div style="font-size:10px;font-weight:700;color:var(--amber)">${coined.includes(b.id)?"✓ ":""}+${b.coins} 🪙</div>`
      : `<div class="muted" style="font-size:10px">🪙 ${b.coins}</div>`;
    d.innerHTML=`<div class="e">${has?b.e:"🔒"}</div><div class="n">${b.n}</div><div class="muted" style="font-size:10px">${b.d}</div>${reward}`;
    g.appendChild(d);
  });
}
let _knownBadges=null;
async function checkNewBadges(){
  const logs=await DB.getLogs().catch(()=>[]);
  const s=statsFrom(ME,logs);
  const res=await awardBadgeCoins(s);   // pay one-time coin lump sums
  const now=BADGES.filter(b=>b.test(s)).map(b=>b.id);
  if(res.fresh.length){ const b=res.fresh[0]; toast(`${b.e} ${b.n} unlocked! +${res.total} 🪙`); }
  else if(_knownBadges){ const fresh=now.filter(id=>!_knownBadges.includes(id));
    if(fresh.length){ const b=BADGES.find(x=>x.id===fresh[0]); toast(`${b.e} Badge unlocked: ${b.n}!`); } }
  _knownBadges=now;
}

/* ---------- PROFILE / SETTINGS ---------- */
async function renderProfile(){
  const ag=AGE_GROUPS[ME.age_group]||AGE_GROUPS.adult;
  const logs=await DB.getLogs(ME.id).catch(()=>[]);
  const rest=effectiveRest(ME);
  app().innerHTML=`
   <div class="fade">
    <div class="topbar"><div class="logo"><span class="dot"></span>Profile</div>
      <span class="pill">☁️ Synced</span></div>
    <div class="card center" style="margin-bottom:16px">
      <div style="display:flex;justify-content:center;margin:0 auto 10px">${avatarHTML(ME,84)}</div>
      <h2>${esc(ME.name)}</h2>
      <div class="muted">Level ${levelFor(ME.xp)} · ${ME.xp} XP · 🔥 ${ME.streak} · 🪙 ${getCoins(ME)}</div>
      <button class="btn teal sm" id="pf_avatar" style="margin-top:12px">🎨 Customize avatar &amp; shop</button>
      <div class="field" style="margin-top:16px;text-align:left"><label>Age group (changes intensity & rest)</label>
        <select id="pf_age"></select></div>
      <div class="muted" style="font-size:12px;text-align:left">${ag.emoji} ${ag.note} — ${ag.sets} sets · default ${ag.restSet}s set rest · ${ag.restEx}s between exercises</div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="exhead" style="color:var(--teal)">⏱️ Your rest times</div>
      <p class="muted" style="font-size:12px;margin:6px 0 12px">Tune rest to your level — shorter for more challenge, longer to recover.</p>
      <div class="row between" style="margin-bottom:12px">
        <div><div style="font-weight:700">Between sets</div><div class="muted" style="font-size:12px">within an exercise</div></div>
        <div class="row" style="gap:8px">
          <button class="btn sm alt stp" id="rs_minus">−</button>
          <span id="rs_val" style="font-weight:800;min-width:54px;text-align:center">${rest.set}s</span>
          <button class="btn sm alt stp" id="rs_plus">＋</button>
        </div>
      </div>
      <div class="row between">
        <div><div style="font-weight:700">Between exercises</div><div class="muted" style="font-size:12px">moving to the next move</div></div>
        <div class="row" style="gap:8px">
          <button class="btn sm alt stp" id="re_minus">−</button>
          <span id="re_val" style="font-weight:800;min-width:54px;text-align:center">${rest.ex}s</span>
          <button class="btn sm alt stp" id="re_plus">＋</button>
        </div>
      </div>
      <button class="btn alt sm" id="rs_reset" style="width:100%;margin-top:14px">↺ Reset to age default (${ag.restSet}s / ${ag.restEx}s)</button>
    </div>

    <button class="btn alt" id="pf_switch" style="margin-bottom:10px">🔄 Switch profile</button>
    <button class="btn alt" id="pf_del" style="margin-bottom:10px;color:var(--coral)">🗑️ Delete this profile</button>
    <p class="muted center" style="font-size:12px;margin-top:8px">${logs.length} workouts logged · best streak ${ME.best_streak} · ☁️ auto-synced</p>
   </div>`;
  const sel=$("#pf_age");
  Object.entries(AGE_GROUPS).forEach(([k,g])=>{const o=document.createElement("option");o.value=k;o.textContent=`${g.emoji} ${g.label} (${g.sub})`;if(k===ME.age_group)o.selected=true;sel.appendChild(o);});
  sel.onchange=async()=>{ ME.age_group=sel.value; await DB.updateProfile(ME.id,{age_group:sel.value}); toast("Intensity updated"); go("profile"); };
  // rest-time steppers
  let rSet=rest.set, rEx=rest.ex;
  const clamp=v=>Math.max(10,Math.min(180,v));
  const saveRest=async()=>{
    rSet=clamp(rSet); rEx=clamp(rEx);
    ME.rest_set=rSet; ME.rest_ex=rEx;
    setRestPref(ME.id,rSet,rEx);                                  // instant + offline cache
    try{ await DB.updateProfile(ME.id,{rest_set:rSet,rest_ex:rEx}); }catch(e){ /* columns optional */ }
    $("#rs_val").textContent=rSet+"s"; $("#re_val").textContent=rEx+"s";
  };
  $("#rs_minus").onclick=()=>{ rSet-=5; saveRest(); };
  $("#rs_plus").onclick =()=>{ rSet+=5; saveRest(); };
  $("#re_minus").onclick=()=>{ rEx-=5; saveRest(); };
  $("#re_plus").onclick =()=>{ rEx+=5; saveRest(); };
  $("#rs_reset").onclick=async()=>{ localStorage.removeItem(restKey(ME.id)); delete ME.rest_set; delete ME.rest_ex;
    try{ await DB.updateProfile(ME.id,{rest_set:null,rest_ex:null}); }catch(e){}
    toast("Rest reset to age default"); go("profile"); };
  $("#pf_avatar").onclick=renderAvatarStudio;
  $("#pf_switch").onclick=()=>{ localStorage.removeItem(ME_KEY); ME=null; $("#nav").classList.add("hidden"); renderProfiles(); };
  $("#pf_del").onclick=async()=>{ if(confirm("Delete "+ME.name+"'s profile and all their logs?")){ await DB.deleteProfile(ME.id); localStorage.removeItem(ME_KEY); ME=null; PROFILES=await DB.getProfiles().catch(()=>[]); $("#nav").classList.add("hidden"); renderProfiles(); } };
}

/* GO */
boot();
</script>
</body>
